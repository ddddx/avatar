name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  cleanup:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Delete old Pages deployments
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const deployments = await github.paginate(
              github.rest.repos.listDeployments,
              {
                owner,
                repo,
                environment: 'github-pages',
                per_page: 100,
              }
            );

            if (deployments.length <= 1) {
              core.info(`Nothing to clean. Found ${deployments.length} deployment.`);
              return;
            }

            const [latest, ...stale] = deployments;
            core.info(`Keeping deployment ${latest.id}, deleting ${stale.length} old deployment(s).`);

            for (const deployment of stale) {
              try {
                await github.rest.repos.createDeploymentStatus({
                  owner,
                  repo,
                  deployment_id: deployment.id,
                  state: 'inactive',
                  auto_inactive: false,
                });
              } catch (error) {
                core.warning(`Failed to mark deployment ${deployment.id} inactive: ${error.message}`);
              }

              try {
                await github.rest.repos.deleteDeployment({
                  owner,
                  repo,
                  deployment_id: deployment.id,
                });
                core.info(`Deleted deployment ${deployment.id}`);
              } catch (error) {
                core.warning(`Failed to delete deployment ${deployment.id}: ${error.message}`);
              }
            }
